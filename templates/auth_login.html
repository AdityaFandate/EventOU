{% extends "base.html" %}

{% block title %}Login | Smart Event Crowd Management{% endblock %}

{% block content %}
<div class="row justify-content-center py-5 reveal">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h4 mb-2 fw-bold text-white" style="font-family: 'Syne', sans-serif;">Sign in</h1>
        <p class="small text-muted mb-4">
          Log in as a student to get passes, or as a host to manage your events.
        </p>

        <form method="post" action="{{ url_for('login') }}" class="vstack gap-3">
          <div class="form-floating">
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder=" "
              required
            />
            <label for="email">Email address</label>
          </div>

          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder=" "
              required
            />
            <label for="password">Password</label>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <a href="{{ url_for('forgot_password') }}" class="small text-accent text-decoration-none">Forgot Password?</a>
            <a href="{{ url_for('forgot_username') }}" class="small text-accent text-decoration-none">Forgot Username?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
            Login
          </button>
        </form>

        <p class="small text-muted mt-4 mb-0 text-center">
          New here?
          <a href="{{ url_for('register') }}" class="text-accent text-decoration-none fw-semibold" style="color: var(--accent);">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
